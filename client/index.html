<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="FlowBoard — modern project kanban with secure accounts, cloud SQLite storage, search, and mobile-friendly boards."
    />
    <meta name="theme-color" content="#0284c7" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FlowBoard" />
    <meta property="og:title" content="FlowBoard — Project kanban for teams and makers" />
    <meta
      property="og:description"
      content="Register, track projects, search tasks, and collaborate with a clean modern board."
    />
    <meta property="og:image" content="/og-cover.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlowBoard" />
    <meta
      name="twitter:description"
      content="Modern project kanban with accounts, search, and cloud save."
    />
    <link rel="canonical" href="/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700&family=Space+Grotesk:wght@500;600;650;700&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var t = localStorage.getItem('kb-theme')
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t)
      } catch (e) {}
    </script>
    <title>FlowBoard — Project kanban</title>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
